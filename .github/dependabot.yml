# Keep GitHub Actions pinned to immutable SHAs current. The workflows
# pin actions to commit SHAs (not floating tags); Dependabot opens PRs
# that bump both the SHA and the trailing `# vX.Y.Z` comment when new
# releases land.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
